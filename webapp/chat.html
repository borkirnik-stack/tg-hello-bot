<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Нейролина</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--tg-theme-bg-color, #0f0f0f);
      color: var(--tg-theme-text-color, #fff);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.03);
      flex-shrink: 0;
    }

    .back-btn {
      width: 32px; height: 32px;
      background: rgba(255,255,255,0.08);
      border: none;
      border-radius: 50%;
      color: rgba(255,255,255,0.7);
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .avatar-wrap {
      position: relative;
      flex-shrink: 0;
    }
    .avatar-chat {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1F6E8C, #A3C7CC);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 20px rgba(31, 110, 140, 0.4);
    }
    .online-dot {
      position: absolute;
      bottom: 1px; right: 1px;
      width: 10px; height: 10px;
      background: #C9F06C;
      border-radius: 50%;
      border: 2px solid #0f0f0f;
    }

    .header-info { flex: 1; }
    .header-name {
      font-size: 16px;
      font-weight: 600;
      color: rgba(255,255,255,0.95);
    }
    .header-sub {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      margin-top: 1px;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      -webkit-overflow-scrolling: touch;
    }

    .msg {
      display: flex;
      gap: 8px;
      max-width: 88%;
      animation: msgIn 0.25s ease;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot { align-self: flex-start; }

    .msg-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1F6E8C, #A3C7CC);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      margin-top: auto;
    }

    .bubble {
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
      max-width: 100%;
      word-break: break-word;
    }
    .msg.user .bubble {
      background: linear-gradient(135deg, #1F6E8C, #8CAAB8);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.bot .bubble {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.9);
      border-bottom-left-radius: 4px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .typing .bubble {
      padding: 12px 16px;
    }
    .dots {
      display: flex; gap: 4px; align-items: center;
    }
    .dots span {
      width: 6px; height: 6px;
      background: rgba(255,255,255,0.4);
      border-radius: 50%;
      animation: dot 1.2s ease-in-out infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dot {
      0%, 80%, 100% { transform: scale(1); opacity: 0.4; }
      40% { transform: scale(1.3); opacity: 1; }
    }

    .input-area {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      padding: 12px 14px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      border-top: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.02);
      flex-shrink: 0;
    }

    .input-wrap {
      flex: 1;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 22px;
      display: flex;
      align-items: flex-end;
      padding: 10px 14px;
    }

    textarea {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: rgba(255,255,255,0.9);
      font-family: inherit;
      font-size: 15px;
      line-height: 1.4;
      resize: none;
      max-height: 120px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    textarea::placeholder { color: rgba(255,255,255,0.25); }

    .send-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1F6E8C, #A3C7CC);
      border: none;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: transform 0.15s ease, opacity 0.15s;
    }
    .send-btn:active { transform: scale(0.92); }
    .send-btn:disabled { opacity: 0.4; }

    .welcome {
      text-align: center;
      padding: 30px 20px;
      animation: msgIn 0.4s ease;
    }
    .welcome-avatar {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1F6E8C, #A3C7CC);
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      margin: 0 auto 14px;
      box-shadow: 0 0 40px rgba(31, 110, 140, 0.35);
    }
    .welcome h2 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .welcome p {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      line-height: 1.5;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 16px;
    }
    .suggestion {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 7px 14px;
      font-size: 13px;
      color: rgba(255,255,255,0.65);
      cursor: pointer;
      transition: all 0.15s;
    }
    .suggestion:active {
      background: rgba(255,255,255,0.13);
    }
  </style>
</head>
<body>
  <div class="header">
    <button class="back-btn" onclick="history.back()">‹</button>
    <div class="avatar-wrap">
      <div class="avatar-chat">✨</div>
      <div class="online-dot"></div>
    </div>
    <div class="header-info">
      <div class="header-name">Нейролина</div>
      <div class="header-sub">ИИ-ассистент · KINEMOTOR</div>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-avatar">✨</div>
      <h2>Привет, я Нейролина</h2>
      <p>Ассистент студии KINEMOTOR PRODUCTION.<br>Спроси меня о видеосъёмке, брифах или просто поболтай.</p>
      <div class="suggestions">
        <div class="suggestion" onclick="send('Что вы снимаете?')">Что вы снимаете?</div>
        <div class="suggestion" onclick="send('Как заполнить бриф?')">Как заполнить бриф?</div>
        <div class="suggestion" onclick="send('Сколько стоит ролик?')">Сколько стоит ролик?</div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="input" placeholder="Написать…" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    </div>
    <button class="send-btn" id="sendBtn" onclick="send()" disabled>↑</button>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.expand();
      tg.setHeaderColor('#0f0f0f');
      tg.setBackgroundColor('#0f0f0f');
    }

    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const API_BASE = window.location.origin;

    let history = [];
    let isLoading = false;

    inputEl.addEventListener('input', () => {
      sendBtn.disabled = !inputEl.value.trim() || isLoading;
    });

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (!sendBtn.disabled) send();
      }
    }

    function addMsg(role, text) {
      const welcome = document.getElementById('welcome');
      if (welcome) welcome.remove();

      const msg = document.createElement('div');
      msg.className = `msg ${role}`;

      if (role === 'bot') {
        msg.innerHTML = `
          <div class="msg-avatar">✨</div>
          <div class="bubble">${escHtml(text)}</div>
        `;
      } else {
        msg.innerHTML = `<div class="bubble">${escHtml(text)}</div>`;
      }

      messagesEl.appendChild(msg);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return msg;
    }

    function showTyping() {
      const msg = document.createElement('div');
      msg.className = 'msg bot typing';
      msg.id = 'typing';
      msg.innerHTML = `
        <div class="msg-avatar">✨</div>
        <div class="bubble"><div class="dots"><span></span><span></span><span></span></div></div>
      `;
      messagesEl.appendChild(msg);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function removeTyping() {
      document.getElementById('typing')?.remove();
    }

    function escHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\n/g, '<br>');
    }

    async function send(preset) {
      const text = preset || inputEl.value.trim();
      if (!text || isLoading) return;

      inputEl.value = '';
      inputEl.style.height = 'auto';
      sendBtn.disabled = true;
      isLoading = true;

      addMsg('user', text);
      history.push({ role: 'user', content: text });

      showTyping();

      try {
        const res = await fetch(`${API_BASE}/api/neurolina`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: history }),
        });
        const data = await res.json();
        removeTyping();
        const reply = data.reply || 'Что-то пошло не так 😔';
        addMsg('bot', reply);
        history.push({ role: 'assistant', content: reply });
      } catch (e) {
        removeTyping();
        addMsg('bot', 'Нет соединения с сервером 😔');
      }

      isLoading = false;
      sendBtn.disabled = !inputEl.value.trim();
      inputEl.focus();
    }
  </script>
</body>
</html>
